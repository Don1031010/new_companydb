{% extends "base.html" %}

{% block title %}{{ wl.name }} — 削除{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-16 text-center">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 mx-auto mb-4 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
        </svg>
        <h1 class="text-lg font-bold text-gray-900 mb-2">「{{ wl.name }}」を削除しますか？</h1>
        <p class="text-sm text-gray-500 mb-6">{{ wl.entries.count }} 社のエントリーがすべて削除されます。この操作は取り消せません。</p>
        <div class="flex justify-center gap-3">
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="bg-red-600 hover:bg-red-700 text-white text-sm font-medium px-5 py-2 rounded-lg transition-colors">削除する</button>
            </form>
            <a href="{% url 'watchlists:detail' wl.pk %}" class="bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-medium px-5 py-2 rounded-lg transition-colors">キャンセル</a>
        </div>
    </div>
</div>
{% endblock %}
