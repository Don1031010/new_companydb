{% for d in disclosures %}
<tr class="hover:bg-gray-50 transition-colors">
    <td class="px-4 py-2.5 text-sm text-gray-600 whitespace-nowrap">{{ d.disclosed_date|date:"Y-m-d" }}</td>
    <td class="px-4 py-2.5 text-sm text-gray-900">{{ d.title }}</td>
    <td class="px-4 py-2.5 text-sm whitespace-nowrap">
        <div class="flex gap-2">
            {% if d.pdf_url %}
            <a href="{{ d.pdf_url }}" target="_blank" rel="noopener"
               class="text-xs bg-red-50 text-red-700 border border-red-200 rounded px-1.5 py-0.5 hover:bg-red-100 transition-colors"
               onclick="event.stopPropagation()">PDF</a>
            {% endif %}
            {% if d.html_summary_url %}
            <a href="{{ d.html_summary_url }}" target="_blank" rel="noopener"
               class="text-xs bg-blue-50 text-blue-700 border border-blue-200 rounded px-1.5 py-0.5 hover:bg-blue-100 transition-colors"
               onclick="event.stopPropagation()">HTML</a>
            {% endif %}
            {% if d.html_attachment_url %}
            <a href="{{ d.html_attachment_url }}" target="_blank" rel="noopener"
               class="text-xs bg-blue-50 text-blue-700 border border-blue-200 rounded px-1.5 py-0.5 hover:bg-blue-100 transition-colors"
               onclick="event.stopPropagation()">添付</a>
            {% endif %}
            {% if d.xbrl_url %}
            <a href="{{ d.xbrl_url }}" target="_blank" rel="noopener"
               class="text-xs bg-green-50 text-green-700 border border-green-200 rounded px-1.5 py-0.5 hover:bg-green-100 transition-colors"
               onclick="event.stopPropagation()">XBRL</a>
            {% endif %}
        </div>
    </td>
</tr>
{% endfor %}
